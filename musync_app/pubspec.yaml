name: musync_mimo
description: Synchronize music playback across multiple devices on the same Wi-Fi network.
version: 0.1.39+39
publish_to: 'none'

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio
  just_audio: ^0.9.40
  just_audio_windows: ^0.2.2
  audio_session: ^0.1.19

  # Network
  web_socket_channel: ^3.0.1
  multicast_dns: ^0.3.2
  basic_utils: ^5.7.0

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # Local storage
  sqflite: ^2.4.1
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # File picking
  file_picker: ^8.0.7

  # Audio metadata (ID3) — pure Dart, cross-platform, no native code
  audio_metadata_reader: ^1.4.2

  # UUID
  uuid: ^4.5.1

  # Logging
  logger: ^2.4.0

  # Connectivity
  connectivity_plus: ^6.0.3
  network_info_plus: ^5.0.3
  permission_handler: ^11.3.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2

  # Firebase
  firebase_core: ^3.8.1
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
