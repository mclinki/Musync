name: musync_mimo
description: Synchronize music playback across multiple devices on the same Wi-Fi network.
version: 0.1.46+46
publish_to: 'none'

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio
  just_audio: ^0.10.5
  just_audio_windows: ^0.2.2
  audio_session: ^0.2.3
  volume_controller: ^3.4.0

  # Network
  web_socket_channel: ^3.0.1
  multicast_dns: ^0.3.2
  basic_utils: ^5.7.0

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Local storage
  sqflite: ^2.4.1
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # File picking
  file_picker: ^10.3.10

  # Audio metadata (ID3) — pure Dart, cross-platform, no native code
  audio_metadata_reader: ^1.4.2

  # UUID
  uuid: ^4.5.1

  # Logging
  logger: ^2.4.0

  # Connectivity
  connectivity_plus: ^7.1.0
  network_info_plus: ^7.0.0
  permission_handler: ^12.0.1

  # UI
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  share_plus: ^10.1.4

  # Firebase
  firebase_core: ^4.6.0
  firebase_crashlytics: ^5.1.0
  firebase_analytics: ^12.2.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
